y_1.png`},{id:`2`,title:`영롱한 오로라 네일`,image:`/assets/images/nail_art_story_2.png`},{id:`3`,title:`미니멀 스파클 네일`,image:`/assets/images/nail_art_recommend_3.png`},{id:`4`,title:`골드 에메랄드 네일`,image:`/assets/images/nail_art_recommend_4.png`}]},updateDesign:t=>e(e=>({design:{...e.design,...t}})),stories:[{id:`1`,title:`이달의 화이트데이 특선: 체리 블라썸 🍒`,content:`봄의 설렘을 담은 체리 블라썸 아트입니다. 사랑스러운 체리 드로잉과 은은한 진주 파츠의 완벽한 조화! 데이트 룩의 완성은 네일에서 시작됩니다.`,date:`2024-03-28`,img:`/assets/images/nail_art_story_1.png`,author:`NailBliss_Official`,hidden:!1,comments:[]},{id:`2`,title:`영롱한 보석의 광채: 오로라 아이스 네일 ❄️`,content:`빛의 각도에 따라 오묘하게 변하는 신비로운 오로라 광채입니다. 얼음 조각처럼 투명하고 맑은 느낌으로 손끝을 화사하게 밝혀보세요.`,date:`2024-03-29`,img:`/assets/images/nail_art_story_2.png`,author:`Senior_Designer_J`,hidden:!1,comments:[]},{id:`3`,title:`클래식의 재해석: 실버 글리터 프렌치 ✨`,content:`유행을 타지 않는 우아함의 정석, 프렌치 네일에 실버 글리터를 더했습니다. 격식 있는 자리부터 데일리까지 모두 소화 가능한 만능 아트입니다.`,date:`2024-03-30`,img:`/assets/images/nail_art_story_3.png`,author:`Stylist_Sarah`,hidden:!1,comments:[]},{id:`4`,title:`손끝에 핀 입체 꽃: 엠보 플라워 & 진주 🌸`,content:`정교한 핸드페인팅과 3D 엠보 기법으로 살려낸 꽃잎의 디테일! 우아한 진주와 함께 어우러져 한 폭의 그림 같은 분위기를 선사합니다.`,date:`2024-04-01`,img:`/assets/images/nail_art_story_4.png`,author:`Art_Director_H`,hidden:!1,comments:[]},{id:`5`,title:`심해의 미학: 갤럭시 카키 자석 네일 🌌`,content:`자석으로 빚어낸 오묘한 은하수의 흐름. 신비로운 카키와 에메랄드 톤이 어우러져 매혹적인 분위기를 연출하는 전문가용 하이엔드 아트입니다.`,date:`2024-04-02`,img:`/assets/images/nail_art_story_5.png`,author:`Tech_Master_K`,hidden:!1,comments:[]},{id:`6`,title:`청순함과 화려함 사이: 시럽 그라데이션 & 골드 🍑`,content:`은은한 복숭아빛 혈색을 담은 시럽 네일에 고급스러운 골드 리프 포인트를 더했습니다. 내추럴한 아름다움을 추구하시는 분들께 강력 추천합니다.`,date:`2024-04-02`,img:`/assets/images/nail_art_story_6.png`,author:`Color_Specialist`,hidden:!1,comments:[]},{id:`7`,title:`가장 빛나는 순간: 웨딩 화이트 리본 & 스와로브스키 💍`,content:`신부님들이 가장 선호하시는 No.1 베스트셀러! 순백의 화이트 베이스와 앙증맞은 입체 리본, 그리고 정품 스와로브스키의 눈부신 반짝임입니다.`,date:`2024-04-02`,img:`/assets/images/nail_art_story_7.png`,author:`Bridal_Expert`,hidden:!1,comments:[]},{id:`8`,title:`시크한 도시의 감성: 딥 퍼플 매트 & 실버 라인 💜`,content:`벨벳 같은 매트한 질감과 날카로운 실버 라인의 절묘한 조화. 시크하고 세련된 오피스룩이나 파티룩에 완벽한 포인트가 되어줄 아트입니다.`,date:`2024-04-02`,img:`/assets/images/nail_art_story_8.png`,author:`Fashion_Icons`,hidden:!1,comments:[]},{id:`9`,title:`기분 전환 100%: 테디베어 귀요미 캐릭터 아트 🧸`,content:`일상에 힐링을 선사하는 귀여운 테디베어 핸드페인팅! 파스텔톤 컬러감과 조화를 이루어 볼 때마다 행복해지는 마법 같은 아트입니다.`,date:`2024-04-02`,img:`/assets/images/nail_art_story_9.png`,author:`Cute_Concept_Lab`,hidden:!1,comments:[]},{id:`10`,title:`밤하늘을 옮기다: 은하수 블루 글리터 그라데이션 ☄️`,content:`깊은 밤바다와 무한한 우주를 담은 몽환적인 블루 아트. 밤하늘의 별처럼 쏟아지는 글리터 그라데이션으로 신비로운 아우라를 완성하세요.`,date:`2024-04-02`,img:`/assets/images/nail_art_story_10.png`,author:`Galaxy_Master`,hidden:!1,comments:[]}],addStory:t=>e(e=>({stories:[{id:Date.now().toString(),date:new Date().toISOString().split(`T`)[0],comments:[],hidden:!1,...t},...e.stories]})),deleteStory:t=>e(e=>({stories:e.stories.filter(e=>e.id!==t)})),inquiryFormFields:[`연락처`,`방문 예정일`,`문의 내용`],inquiries:[],addInquiry:t=>e(e=>({inquiries:[{id:Date.now().toString(),date:new Date().toISOString(),...t},...e.inquiries]}))}),{name:`nailbliss-storage`,storage:Hr(()=>localStorage)}));typeof window<`u`&&window.addEventListener(`storage`,e=>{e.key===`easytax-storage`&&Wr.persist.rehydrate()});var Gr=o((e=>{var t=Symbol.for(`react.transitional.element`),n=Symbol.for(`react.fragment`);function r(e,n,r){var i=null;if(r!==void 0&&(i=``+r),n.key!==void 0&&(i=``+n.key),`key`in n)for(var a in r={},n)a!==`key`&&(r[a]=n[a]);else r=n;return n=r.ref,{$$typeof:t,type:e,key:i,ref:n===void 0?null:n,props:r}}e.Fragment=n,e.jsx=r,e.jsxs=r})),L=o(((e,t)=>{t.exports=Gr()}))();function Kr(){let{design:e,stories:t,inquiryFormFields:n,addInquiry:r,addStory:i,deleteStory:a}=Wr(),[o,s]=(0,x.useState)(0),[c,l]=(0,x.useState)(0),[u,d]=(0,x.useState)(null),[f,p]=(0,x.useState)({}),[m,h]=(0,x.useState)(!1),[g,_]=(0,x.useState)(!1),[v,y]=(0,x.useState)(3),[b,S]=(0,x.useState)(3600),[C,w]=(0,x.useState)(!1),[T,E]=(0,x.useState)(`전체`),[D,O]=(0,x.useState)(!1),[ee,te]=(0,x.useState)(!1),[ne,re]=(0 - 성함, 연락처, 업체명, 상담 문의 내용.

2. 개인정보 수집 및 이용 목적
- 파트너십 및 브랜드 가맹 상담, 본사 공지사항 전달.

- 본 사이트 및 네일블리스 브랜드의 모든 디자인, 로고, 아트는 본사의 고유 자산이며 무단 복제 및 상업적 이용을 엄격히 금지합니다.

2. 서비스의 제공
- 본사는 파트너에게 브랜드 교육, 자재 공급, 마케팅 지원을 표준 계약에 의거하여 제공합니다.
